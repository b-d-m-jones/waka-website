<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — Waka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cagliostro&family=Work+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #EC6464;
      --dark: #365C6A;
      --text: #1a2e35;
      --muted: #6b8a94;
      --bg: #fafaf8;
    }

    body {
      font-family: 'Work Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo { margin-bottom: 2.5rem; }
    .logo img { height: 48px; }

    .icon {
      width: 64px;
      height: 64px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-family: 'Cagliostro', serif;
      font-size: 2rem;
      color: var(--dark);
      margin-bottom: 0.75rem;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 380px;
      line-height: 1.6;
    }

    .back {
      margin-top: 2rem;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .back:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <div class="logo">
    <img src="waka-logo.svg" alt="Waka" />
  </div>

  <div class="icon">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#4caf50" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="20 6 9 17 4 12" />
    </svg>
  </div>

  <h1>You're on the list!</h1>
  <p>Your email has been confirmed. We'll be in touch when Waka is ready.</p>

  <a class="back" href="/">← Back to home</a>
</body>

</html>
