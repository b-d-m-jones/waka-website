<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Waka is the budgeting app, productivity tracker, and social network built for New Zealanders. Manage your money, hit your goals, and connect with your community. All in one place. Sign up for early access." />
  <title>Waka · Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cagliostro&family=Work+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #EC6464;
      --primary-hover: #d44f4f;
      --primary-light: #f08888;
      --dark: #365C6A;
      --cream: #FFF3C2;
      --taupe: #B1A496;
      --white: #FFFFFF;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Work Sans', sans-serif;
      background: var(--dark);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    h2 {
      font-family: 'Cagliostro', serif;
      line-height: 1.15;
    }

    /* ── CTA ── */
    .cta-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .cta-section::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(236, 100, 100, 0.1) 0%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .cta-section h2 {
      font-size: clamp(30px, 4vw, 56px);
      font-weight: 400;
      color: var(--cream);
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
      letter-spacing: -0.5px;
    }

    .cta-section > p {
      color: rgba(210, 195, 175, 0.85);
      font-size: 18px;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }

    .cta-section .form-wrap {
      margin: 0 auto 40px;
    }

    /* ── Form ── */
    .form-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      margin-bottom: 24px;
    }

    .email-form {
      display: flex;
      gap: 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 243, 194, 0.12);
      border-radius: 14px;
      padding: 6px;
    }

    .email-label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    .email-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      outline: none;
      color: var(--cream);
      font-family: 'Work Sans', sans-serif;
      font-size: 15px;
      padding: 12px 16px;
      border-radius: 10px;
    }

    .email-input::placeholder {
      color: rgba(177, 164, 150, 0.5);
    }

    .btn-submit {
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-family: 'Work Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background-color 200ms ease, transform 150ms ease;
    }

    .btn-submit:hover { background: var(--primary-hover); }

    .btn-submit:focus-visible {
      outline: 2px solid var(--cream);
      outline-offset: 2px;
    }

    .btn-submit:active { transform: scale(0.97); }

    .btn-submit:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .success-msg {
      display: none;
      align-items: center;
      gap: 8px;
      color: #4ADE80;
      font-weight: 500;
      font-size: 15px;
      margin-bottom: 48px;
    }

    .success-msg.visible { display: flex; }

    .error-msg {
      color: var(--primary-light);
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    .error-msg.visible { display: block; }

    .no-spam {
      color: rgba(177, 164, 150, 0.5);
      font-size: 13px;
      position: relative;
      z-index: 1;
    }

    /* ── Footer ── */
    footer {
      padding: 24px;
      text-align: center;
    }

    .footer-logo img {
      height: 52px;
      width: auto;
      border-radius: 8px;
      display: block;
      margin: 0 auto 10px;
    }

    footer p {
      color: rgba(177, 164, 150, 0.85);
      font-size: 14px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .email-form {
        flex-direction: column;
        gap: 6px;
      }

      .btn-submit {
        width: 100%;
        padding: 14px;
        text-align: center;
      }

      .cta-section {
        padding: 48px 20px 36px;
      }
    }
  </style>
</head>

<body>

  <!-- Bottom CTA -->
  <section class="cta-section" aria-labelledby="cta-heading">
    <img src="waka-icon.svg" alt="Waka" style="width: 120px; height: 120px; display: block; margin: 0 auto 24px;" />
    <h2 id="cta-heading">Be first on board</h2>
    <p>Sign up for early access and help shape Waka, the app built for Kiwis, by Kiwis.</p>

    <div class="form-wrap" id="cta-form-wrap">
      <form class="email-form" id="cta-form" novalidate aria-label="Waitlist signup">
        <label class="email-label" for="cta-email">Your email address</label>
        <input type="email" id="cta-email" name="email" class="email-input" placeholder="you@example.com"
          autocomplete="email" required aria-required="true" />
        <button type="submit" class="btn-submit" id="cta-btn">
          Join the Waitlist
        </button>
      </form>
      <p class="error-msg" id="cta-error" role="alert">Please enter a valid email address.</p>
      <p class="error-msg" id="cta-token-error" role="alert"></p>
    </div>
    <div class="success-msg" id="cta-success" role="status" aria-live="polite">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="20 6 9 17 4 12" />
      </svg>
      Check your email. We've sent you a confirmation link.
    </div>

    <p class="no-spam">No spam. Unsubscribe anytime.</p>
  </section>

  <!-- Footer -->
  <footer>
    <div class="footer-logo"><img src="waka-logo.svg" alt="Waka" /></div>
    <p>&copy; 2026 Waka. Made with aroha in Aotearoa New Zealand.</p>
  </footer>

  <script>
    (function () {
      var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      function setupForm(formId, btnId, errorId, successId) {
        var form = document.getElementById(formId);
        var btn = document.getElementById(btnId);
        var errorEl = document.getElementById(errorId);
        var success = document.getElementById(successId);
        if (!form) return;

        form.addEventListener('submit', function (e) {
          e.preventDefault();

          var input = form.querySelector('input[type="email"]');
          var email = input.value.trim();

          // Validate
          if (!EMAIL_RE.test(email)) {
            errorEl.classList.add('visible');
            input.focus();
            return;
          }

          errorEl.classList.remove('visible');
          btn.disabled = true;
          btn.textContent = 'Joining\u2026';

          fetch('/waitlist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email }),
          })
            .then(function (res) {
              if (!res.ok) throw new Error('Request failed');
              document.getElementById('cta-form-wrap').style.display = 'none';
              success.classList.add('visible');
            })
            .catch(function () {
              btn.disabled = false;
              btn.textContent = 'Join the Waitlist';
              errorEl.textContent = 'Something went wrong. Please try again.';
              errorEl.classList.add('visible');
            });
        });

        // Clear error on input
        form.querySelector('input[type="email"]').addEventListener('input', function () {
          errorEl.classList.remove('visible');
        });
      }

      setupForm('cta-form', 'cta-btn', 'cta-error', 'cta-success');

      var tokenError = document.getElementById('cta-token-error');
      var errorMessages = {
        invalid_token: 'That verification link is invalid.',
        expired_token: 'That verification link has expired. Please sign up again.',
      };
      var errorParam = new URLSearchParams(window.location.search).get('error');
      if (errorParam && errorMessages[errorParam]) {
        tokenError.textContent = errorMessages[errorParam];
        tokenError.classList.add('visible');
        tokenError.scrollIntoView({behavior: 'smooth', block: 'center'});
      }
    })();
  </script>

</body>

</html>
